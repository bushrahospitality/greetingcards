<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>بطاقة تهنئة - بشرى الضيافة</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* Balloon animation */

.balloon-container{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:9999;
}

.balloon{
position:absolute;
bottom:100%;
width:40px;
height:55px;
border-radius:50%;
animation:fall 6s linear forwards;
}

.balloon::after{
content:"";
position:absolute;
width:2px;
height:40px;
background:#888;
left:50%;
top:55px;
}

.gold{
background:#D4AF37;
}

.blue{
background:#154F83;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0.8;
}
}
    body {
      margin: 0;
      font-family: Tajawal, Arial, sans-serif;
      background: #f4efe8;
      color: #1a1a1a;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px;
    }

    h3 {
      margin: 6px 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0 0 14px;
      color: #444;
    }

    .box {
      background: #fff;
      border: 1px solid #e6dfd6;
      border-radius: 16px;
      padding: 16px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e1d9cf;
      outline: none;
      font-size: 16px;
      background: #faf8f5;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      background: #AD8252;
      color: #111;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .preview {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    canvas {
      width: 100%;
      max-width: 480px;
      height: auto;
      border-radius: 16px;
      border: 1px solid #e6dfd6;
      background: #fff;
    }

    /* Arrow Controls */
    .controls {
      margin-top: 10px;
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .arrow-row {
      display: flex;
      gap: 8px;
    }

    .arrow-btn {
      background: #1f5f99;
      color: #fff;
      width: 45px;
      height: 45px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }

    .reset-btn {
      background: #AD8252;
      color: #111;
      width: auto;
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .box {
        grid-template-columns: 1fr;
      }
      canvas {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="balloon-container" id="balloons"></div>

  <div class="wrap">

    <h3>موظفي بشرى الضيافة 💙 صمّم بطاقة تهنئة رمضان باللغة اللي تختارها</h3>
    <p>اختر لغة التهنئة، اكتب اسمك، ثم حمّل بطاقتك مباشرة.</p>

    <div class="box">

      <div>

        <label for="lang">لغة التهنئة</label>
        <select id="lang">
          <option value="ar" selected>التهنئة باللغة العربية</option>
          <option value="en">التهنئة باللغة الإنجليزية</option>
          <option value="fr">التهنئة باللغة الفرنسية</option>
          <option value="bn">التهنئة باللغة البنغالية</option>
          <option value="in">التهنئة باللغة الإندونيسية</option>
          <option value="ur">التهنئة باللغة الأردية</option>
        </select>

        <label for="name">الاسم</label>
        <input id="name" type="text" placeholder="اكتب اسمك هنا" autocomplete="name" />

        <button type="button" id="downloadBtn">تنزيل البطاقة</button>

        <div class="note">
          📌 الاسم سيظهر تحت عبارة التهنئة مباشرة.
        </div>
         <div class="note">
        ⬇️⬆️➡️⬅️  ضبط موضع الاسم من الاسهم اسفل الصورة.
        </div>

      </div>

      <div class="preview">

        <canvas id="imageCanvas" width="2016" height="3840"></canvas>

        <!-- Arrow Controls -->
        <div class="controls">
          <div>
            <button class="arrow-btn" id="upBtn">↑</button>
          </div>
          <div class="arrow-row">
            <button class="arrow-btn" id="leftBtn">←</button>
            <button class="arrow-btn" id="rightBtn">→</button>
          </div>
          <div>
            <button class="arrow-btn" id="downBtn">↓</button>
          </div>

          <button class="reset-btn" id="resetBtn">
            إرجاع الوضع الافتراضي
          </button>
        </div>

        <a id="downloadLink" download="Card.png" href="#" style="display:none;"></a>

      </div>

    </div>

  </div>

  <script src="js/app.js"></script>
  <script>

window.addEventListener("load",()=>{

const container=document.getElementById("balloons");

const colors=["gold","blue"];

for(let i=0;i<20;i++){

let balloon=document.createElement("div");

balloon.classList.add("balloon");
balloon.classList.add(colors[Math.floor(Math.random()*colors.length)]);

balloon.style.left=Math.random()*100+"%";
balloon.style.animationDelay=Math.random()*3+"s";
balloon.style.width=(30+Math.random()*20)+"px";
balloon.style.height=(40+Math.random()*30)+"px";

container.appendChild(balloon);

}

/* remove balloons after animation */

setTimeout(()=>{
container.innerHTML="";
},7000);

});

</script>

</body>
</html>
