<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>بطاقة تهنئة - بشرى الضيافة</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
#balloon-layer{
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 0;
}

.real-balloon{
  position: absolute;
  bottom: -220px;
  width: 80px;
  height: auto;
  opacity: 0.5;
  animation-name: balloonRise;
  animation-timing-function: ease-in-out;
  animation-fill-mode: forwards;
  will-change: transform, bottom, left;
}

@keyframes balloonRise {
  0% {
    transform: translateY(0) translateX(0) rotate(0deg);
    opacity: 0;
  }

  10% {
    opacity: 0.45;
  }

  25% {
    transform: translateY(-25vh) translateX(12px) rotate(3deg);
  }

  50% {
    transform: translateY(-50vh) translateX(-14px) rotate(-3deg);
  }

  75% {
    transform: translateY(-75vh) translateX(10px) rotate(2deg);
  }

  100% {
    transform: translateY(-120vh) translateX(-8px) rotate(-2deg);
    opacity: 0;
  }
}
    body {
      margin: 0;
      font-family: Tajawal, Arial, sans-serif;
      background: #f4efe8;
      color: #1a1a1a;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px;
    }

    h3 {
      margin: 6px 0 10px;
      font-size: 24px;
    }

    p {
      margin: 0 0 14px;
      color: #444;
    }

    .box {
      background: #fff;
      border: 1px solid #e6dfd6;
      border-radius: 16px;
      padding: 16px;
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 16px;
      align-items: start;
      position: relative;
      z-index: 2;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #e1d9cf;
      outline: none;
      font-size: 16px;
      background: #faf8f5;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 0;
      cursor: pointer;
      font-weight: 700;
      font-size: 16px;
      background: #AD8252;
      color: #111;
    }

    .note {
      margin-top: 10px;
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }

    .preview {
      display: grid;
      justify-items: center;
      gap: 12px;
    }

    canvas {
      width: 100%;
      max-width: 480px;
      height: auto;
      border-radius: 16px;
      border: 1px solid #e6dfd6;
      background: #fff;
    }

    /* Arrow Controls */
    .controls {
      margin-top: 10px;
      display: grid;
      gap: 6px;
      justify-items: center;
    }

    .arrow-row {
      display: flex;
      gap: 8px;
    }

    .arrow-btn {
      background: #1f5f99;
      color: #fff;
      width: 45px;
      height: 45px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }

    .reset-btn {
      background: #AD8252;
      color: #111;
      width: auto;
      padding: 8px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .box {
        grid-template-columns: 1fr;
      }
      canvas {
        max-width: 100%;
      }
    }
  </style>
</head>

<body>

 <div id="balloon-layer"></div>

  <div class="wrap">

    <h3>موظفي بشرى الضيافة 💙 صمّم بطاقة تهنئة رمضان باللغة اللي تختارها</h3>
    <p>اختر لغة التهنئة، اكتب اسمك، ثم حمّل بطاقتك مباشرة.</p>

    <div class="box">

      <div>

        <label for="lang">لغة التهنئة</label>
        <select id="lang">
          <option value="ar" selected>التهنئة باللغة العربية</option>
          <option value="en">التهنئة باللغة الإنجليزية</option>
          <option value="fr">التهنئة باللغة الفرنسية</option>
          <option value="bn">التهنئة باللغة البنغالية</option>
          <option value="in">التهنئة باللغة الإندونيسية</option>
          <option value="ur">التهنئة باللغة الأردية</option>
        </select>

        <label for="name">الاسم</label>
        <input id="name" type="text" placeholder="اكتب اسمك هنا" autocomplete="name" />

        <button type="button" id="downloadBtn">تنزيل البطاقة</button>

        <div class="note">
          📌 الاسم سيظهر تحت عبارة التهنئة مباشرة.
        </div>
         <div class="note">
        ⬇️⬆️➡️⬅️  ضبط موضع الاسم من الاسهم اسفل الصورة.
        </div>

      </div>

      <div class="preview">

        <canvas id="imageCanvas" width="2016" height="3840"></canvas>

        <!-- Arrow Controls -->
        <div class="controls">
          <div>
            <button class="arrow-btn" id="upBtn">↑</button>
          </div>
          <div class="arrow-row">
            <button class="arrow-btn" id="leftBtn">←</button>
            <button class="arrow-btn" id="rightBtn">→</button>
          </div>
          <div>
            <button class="arrow-btn" id="downBtn">↓</button>
          </div>

          <button class="reset-btn" id="resetBtn">
            إرجاع الوضع الافتراضي
          </button>
        </div>

        <a id="downloadLink" download="Card.png" href="#" style="display:none;"></a>

      </div>

    </div>

  </div>

  <script src="js/app.js"></script>
<script>
  window.addEventListener("load", () => {
    const layer = document.getElementById("balloon-layer");
    if (!layer) return;

    const balloonImages = [
      "balloon-gold-1.png",
      "balloon-blue-1.png"
    ];

    // عدد مناسب للموبايل
    const totalBalloons = window.innerWidth < 768 ? 10 : 16;

    for (let i = 0; i < totalBalloons; i++) {
      const balloon = document.createElement("img");
      balloon.className = "real-balloon";
      balloon.src = balloonImages[Math.floor(Math.random() * balloonImages.length)];
      balloon.alt = "balloon";

      const left = Math.random() * 100;
      const size = window.innerWidth < 768
        ? 55 + Math.random() * 35
        : 70 + Math.random() * 45;

      const duration = 4 + Math.random() * 3; // سريع لكن ناعم
      const delay = Math.random() * 1.2;

      balloon.style.left = `${left}%`;
      balloon.style.width = `${size}px`;
      balloon.style.animationDuration = `${duration}s`;
      balloon.style.animationDelay = `${delay}s`;

      layer.appendChild(balloon);
    }

    // إزالة البالونات بعد نهاية الحركة
    setTimeout(() => {
      layer.innerHTML = "";
    }, 9000);
  });
</script>
</body>
</html>
